<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>账号管理 · 腾讯公益开放平台</title>
  <link rel="stylesheet" href="./open_platform.css" />
</head>
<body data-page="account">
  <header>
    <div class="container header-inner">
      <div class="logo">
        <div class="logo-badge">🌺</div>
        腾讯公益开放平台
      </div>
      <nav class="nav">
        <a data-page="home" href="./index.html">首页</a>
        <a data-page="api" href="./api.html">API</a>
        <a data-page="docs" href="./docs.html">帮助文档</a>
        <a data-page="console" href="./console.html">控制台</a>
        <a data-page="admin" href="./admin.html" data-admin-only>管理中心</a>
      </nav>
      <div class="header-actions">
        <a class="btn secondary" href="./account.html?logout=1">退出登录</a>
        <div class="account">
          <button class="btn secondary" type="button" data-account-login>登录</button>
          <a class="avatar" href="./account.html" data-account-avatar title="账号管理">
            <span class="avatar-circle">👤</span>
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <h2>账号管理</h2>
      <p class="muted">这里用于管理你的账号信息、企业资料与安全设置（原型示意）。</p>
    </section>

    <section class="section">
      <div class="grid grid-2">
        <div class="card">
          <h3>基础信息</h3>
          <ul class="list">
            <li>账号：developer@example.com</li>
            <li>角色：开发者</li>
            <li>所属机构：腾讯公益合作方</li>
          </ul>
          <button class="btn secondary" type="button">编辑资料</button>
        </div>
        <div class="card">
          <h3>安全设置</h3>
          <ul class="list">
            <li>最近登录：2026-02-24 16:20</li>
            <li>登录方式：邮箱 / 账号密码</li>
          </ul>
          <button class="btn secondary" type="button">修改密码</button>
        </div>
      </div>
    </section>

    <footer>
      账号管理页用于展示账号资料与安全配置能力。
    </footer>
  </main>

  <script src="./open_platform.js"></script>
</body>
</html>
