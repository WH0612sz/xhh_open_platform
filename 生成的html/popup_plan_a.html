<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案A：温和改良 - 勋章绶带风格</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .popup {
            width: 320px;
            background: linear-gradient(135deg, #FFFAF5 0%, #FFF5F5 100%);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 红色绶带装饰 - 替代原来的灰蓝色装订条 */
        .ribbon {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 8px;
            background: linear-gradient(180deg, #ED3142 0%, #FF6B81 100%);
            box-shadow: 2px 0 8px rgba(237, 49, 66, 0.3);
        }

        /* 去掉线圈装订元素 */

        .content {
            padding: 32px 24px 24px 32px;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
        }

        /* 光芒装饰 */
        .sparkle-container {
            position: relative;
            display: inline-block;
            margin-bottom: 12px;
        }

        .flower-icon {
            font-size: 48px;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .sparkle {
            position: absolute;
            font-size: 20px;
            animation: sparkle 1.5s ease-in-out infinite;
        }

        .sparkle:nth-child(1) {
            top: -5px;
            left: -15px;
            animation-delay: 0s;
        }

        .sparkle:nth-child(2) {
            top: -5px;
            right: -15px;
            animation-delay: 0.3s;
        }

        .sparkle:nth-child(3) {
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 0.6s;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0.5) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.2) rotate(180deg);
            }
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #ED3142;
            margin-bottom: 4px;
            /* 从书法体改为圆润加粗字体 */
        }

        .subtitle {
            font-size: 14px;
            color: #666;
        }

        /* 描述文字 */
        .description {
            text-align: center;
            color: #333;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .activity-name {
            color: #ED3142;
            font-weight: 600;
        }

        /* 微信状态预览 */
        .status-preview {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .preview-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-align: center;
        }

        .preview-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .preview-flower {
            font-size: 24px;
        }

        .preview-text {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }

        /* CTA按钮 */
        .cta-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ED3142 0%, #FF6B81 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(237, 49, 66, 0.3);
            transition: all 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(237, 49, 66, 0.4);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        .cta-subtitle {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        /* 统计信息 */
        .stats {
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        /* 设计标注 */
        .design-notes {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 12px;
            max-width: 300px;
            line-height: 1.5;
        }

        .design-notes h4 {
            margin-bottom: 8px;
            color: #FF6B81;
        }

        .design-notes ul {
            list-style: none;
        }

        .design-notes li {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="popup">
        <!-- 红色绶带替代灰色装订条 -->
        <div class="ribbon"></div>
        
        <div class="content">
            <!-- 标题区域 -->
            <div class="header">
                <div class="sparkle-container">
                    <span class="sparkle">✨</span>
                    <span class="sparkle">✨</span>
                    <span class="sparkle">✨</span>
                    <div class="flower-icon">🌺</div>
                </div>
                <h2 class="title">获得小红花</h2>
                <p class="subtitle">感谢你的善意参与</p>
            </div>

            <!-- 描述 -->
            <div class="description">
                感谢你参与<br>
                <span class="activity-name">「献血点亮生命之光」</span>
            </div>

            <!-- 微信状态预览 -->
            <div class="status-preview">
                <div class="preview-label">— 微信状态预览 —</div>
                <div class="preview-content">
                    <span class="preview-flower">🌺</span>
                    <span class="preview-text">献血点亮生命之光</span>
                </div>
            </div>

            <!-- CTA按钮 -->
            <button class="cta-button">戴上小红花</button>
            <p class="cta-subtitle">设为我的微信状态</p>
            
            <!-- 统计 -->
            <p class="stats">已有 23.8万 人戴上</p>
        </div>
    </div>

    <!-- 设计标注 -->
    <div class="design-notes">
        <h4>方案A：设计要点</h4>
        <ul>
            <li>✓ 左侧红色绶带（8px，渐变#ED3142→#FF6B81）</li>
            <li>✓ 去除线圈装订元素</li>
            <li>✓ 暖色渐变背景（#FFFAF5→#FFF5F5）</li>
            <li>✓ 大红花icon + 光芒动效</li>
            <li>✓ 标题使用圆体加粗字体</li>
            <li>✓ 强化"获得"而非"记录"</li>
        </ul>
    </div>
</body>
</html>
