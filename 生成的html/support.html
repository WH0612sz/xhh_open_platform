      <div class="logo">

      </div>
      <nav class="nav">

  <main class="container">
    <section class="section">
      <h2>常见问题（FAQ）</h2>
      <div class="faq-item">
        <button>如何获取 AppID 和 Secret？</button>
        <div class="answer">进入控制台创建应用后即可查看。</div>
      </div>
      <div class="faq-item">
        <button>签名校验失败怎么排查？</button>
        <div class="answer">检查时间戳、nonce 与 body 拼接顺序是否一致。</div>
      </div>
      <div class="faq-item">
        <button>回调收不到通知怎么办？</button>
        <div class="answer">检查回调地址可访问性与 HTTPS 证书是否有效。</div>
      </div>
    </section>

    <section class="section">
      <h2>公告与变更</h2>
      <div class="card">
        <ul class="list">

      <div class="card">
        <p class="muted">技术支持：support@gongyi.qq.com</p>
        <p class="muted">服务时间：周一至周五 09:00-18:00</p>
      </div>
    </section>

    <footer>
      如需更深度支持，可提交工单并关联应用与错误请求 ID。
    </footer>
