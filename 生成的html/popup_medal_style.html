<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>获得小红花 - 勋章荣誉风格</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 375px;
    min-height: 812px;
    margin: 0 auto;
    background: #000;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* 背景遮罩 */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    z-index: 1;
  }

  /* 弹窗容器 */
  .popup {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    background: #fff;
    border-radius: 24px;
    z-index: 10;
    overflow: visible;
    animation: popupIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  @keyframes popupIn {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  /* 顶部光芒区域 */
  .glow-header {
    position: relative;
    width: 100%;
    height: 200px;
    background: linear-gradient(180deg, #FFF7E6 0%, #FFF0D0 40%, #FFFFFF 100%);
    border-radius: 24px 24px 0 0;
    overflow: visible;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 放射光芒 */
  .rays {
    position: absolute;
    width: 260px;
    height: 260px;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    animation: raysSpin 20s linear infinite;
  }

  @keyframes raysSpin {
    0% { transform: translateX(-50%) rotate(0deg); }
    100% { transform: translateX(-50%) rotate(360deg); }
  }

  .ray {
    position: absolute;
    width: 2px;
    height: 130px;
    left: 50%;
    top: 0;
    transform-origin: 50% 100%;
    border-radius: 2px;
  }

  /* 光晕 */
  .halo {
    position: absolute;
    width: 160px;
    height: 160px;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, rgba(255,215,0,0) 70%);
    animation: haloPulse 2s ease-in-out infinite;
  }

  @keyframes haloPulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.8; }
    50% { transform: translateX(-50%) scale(1.15); opacity: 1; }
  }

  /* 勋章主体 */
  .medal {
    position: relative;
    z-index: 5;
    width: 130px;
    height: 130px;
    margin-top: -10px;
  }

  /* 勋章底座 */
  .medal-base {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(135deg, #FFD700 0%, #FFA000 50%, #FFD700 100%);
    box-shadow:
      0 4px 15px rgba(255, 165, 0, 0.5),
      inset 0 2px 4px rgba(255, 255, 255, 0.6),
      inset 0 -2px 4px rgba(180, 120, 0, 0.3);
    animation: medalIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
  }

  @keyframes medalIn {
    0% { transform: scale(0) rotate(-30deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* 勋章内圈 */
  .medal-inner {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: linear-gradient(180deg, #FFFAF0 0%, #FFF3D6 100%);
    border: 2px solid rgba(255, 180, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 小红花 SVG */
  .flower-icon {
    width: 70px;
    height: 70px;
    animation: flowerBloom 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.6s both;
  }

  @keyframes flowerBloom {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* 绶带 */
  .ribbon {
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
  }

  .ribbon svg {
    width: 90px;
    height: 32px;
  }

  /* 飘散粒子 */
  .particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 3;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    animation: particleFloat 3s ease-in-out infinite;
  }

  @keyframes particleFloat {
    0% { transform: translateY(0) scale(1); opacity: 0.8; }
    50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 0.8; }
  }

  /* 内容区域 */
  .content {
    padding: 24px 28px 20px;
    text-align: center;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    color: #ED3142;
    margin-bottom: 8px;
    animation: titleIn 0.5s ease 0.5s both;
  }

  @keyframes titleIn {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .subtitle {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 20px;
    animation: titleIn 0.5s ease 0.65s both;
  }

  .subtitle strong {
    color: #ED3142;
    font-weight: 600;
  }

  /* 微信状态预览 */
  .wechat-preview {
    background: #F7F7F7;
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    animation: titleIn 0.5s ease 0.8s both;
  }

  .preview-label {
    font-size: 11px;
    color: #999;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .preview-label .eye-icon {
    font-size: 13px;
  }

  .preview-card {
    background: #fff;
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .preview-flower {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .preview-info {
    text-align: left;
    flex: 1;
  }

  .preview-status {
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 2px;
  }

  .preview-source {
    font-size: 11px;
    color: #999;
  }

  /* 按钮 */
  .btn-wrap {
    animation: titleIn 0.5s ease 0.95s both;
  }

  .btn-main {
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, #FF4D5A 0%, #ED3142 100%);
    border: none;
    border-radius: 26px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 16px rgba(237, 49, 66, 0.35);
  }

  .btn-main:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(237, 49, 66, 0.45);
  }

  .btn-main:active {
    transform: translateY(0);
    box-shadow: 0 2px 10px rgba(237, 49, 66, 0.3);
  }

  /* 按钮光泽 */
  .btn-main::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    animation: btnShine 3s ease-in-out infinite;
  }

  @keyframes btnShine {
    0% { left: -100%; }
    30% { left: 120%; }
    100% { left: 120%; }
  }

  .btn-text-main {
    display: block;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1.2;
  }

  .btn-text-sub {
    display: block;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    font-weight: 400;
    margin-top: 1px;
  }

  /* 社会证明 */
  .social-proof {
    margin-top: 14px;
    font-size: 11px;
    color: #BBB;
    animation: titleIn 0.5s ease 1.1s both;
  }

  .social-proof strong {
    color: #ED3142;
    font-weight: 600;
  }

  /* 关闭按钮 */
  .close-btn {
    position: absolute;
    bottom: -56px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
    animation: titleIn 0.5s ease 1.2s both;
  }

  .close-btn:hover {
    opacity: 0.7;
  }

  .close-btn svg {
    width: 14px;
    height: 14px;
  }

  /* 星星飘散动画 */
  .star {
    position: absolute;
    pointer-events: none;
    z-index: 6;
  }

  @keyframes starFall1 {
    0% { transform: translate(0, 0) rotate(0deg) scale(0); opacity: 0; }
    20% { transform: translate(-15px, -10px) rotate(30deg) scale(1); opacity: 1; }
    100% { transform: translate(-40px, 60px) rotate(120deg) scale(0); opacity: 0; }
  }
  @keyframes starFall2 {
    0% { transform: translate(0, 0) rotate(0deg) scale(0); opacity: 0; }
    20% { transform: translate(20px, -15px) rotate(-20deg) scale(1); opacity: 1; }
    100% { transform: translate(50px, 70px) rotate(-100deg) scale(0); opacity: 0; }
  }
  @keyframes starFall3 {
    0% { transform: translate(0, 0) rotate(0deg) scale(0); opacity: 0; }
    25% { transform: translate(-25px, -20px) rotate(45deg) scale(1); opacity: 1; }
    100% { transform: translate(-60px, 50px) rotate(180deg) scale(0); opacity: 0; }
  }
  @keyframes starFall4 {
    0% { transform: translate(0, 0) scale(0); opacity: 0; }
    15% { transform: translate(10px, -25px) scale(1); opacity: 1; }
    100% { transform: translate(35px, 55px) scale(0); opacity: 0; }
  }
  @keyframes starFall5 {
    0% { transform: translate(0, 0) rotate(0deg) scale(0); opacity: 0; }
    20% { transform: translate(-8px, -18px) rotate(-30deg) scale(1); opacity: 1; }
    100% { transform: translate(15px, 65px) rotate(90deg) scale(0); opacity: 0; }
  }

  .star:nth-child(1) { top: 60px; left: 40px; animation: starFall1 2.5s ease-in-out 0.8s infinite; }
  .star:nth-child(2) { top: 50px; right: 40px; animation: starFall2 2.8s ease-in-out 1.0s infinite; }
  .star:nth-child(3) { top: 80px; left: 70px; animation: starFall3 3.0s ease-in-out 1.3s infinite; }
  .star:nth-child(4) { top: 40px; right: 70px; animation: starFall4 2.6s ease-in-out 1.5s infinite; }
  .star:nth-child(5) { top: 100px; left: 50%; animation: starFall5 2.9s ease-in-out 1.1s infinite; }
  .star:nth-child(6) { top: 70px; left: 25%; animation: starFall1 3.2s ease-in-out 1.7s infinite; }

  /* 小红花飘落 */
  .falling-flowers {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 2;
  }

  .falling-flower {
    position: absolute;
    top: -30px;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
    100% { transform: translateY(220px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="popup">
  <!-- 顶部光芒区域 -->
  <div class="glow-header">
    <!-- 光芒射线 -->
    <div class="rays" id="rays"></div>

    <!-- 光晕 -->
    <div class="halo"></div>

    <!-- 飘散粒子 -->
    <div class="particles" id="particles"></div>

    <!-- 飘落的小红花 -->
    <div class="falling-flowers" id="fallingFlowers"></div>

    <!-- 星星飘散 -->
    <svg class="star" width="12" height="12" viewBox="0 0 12 12"><polygon points="6,0 7.5,4 12,4.5 8.5,7.5 9.5,12 6,9.5 2.5,12 3.5,7.5 0,4.5 4.5,4" fill="#FFD700" opacity="0.9"/></svg>
    <svg class="star" width="10" height="10" viewBox="0 0 12 12"><polygon points="6,0 7.5,4 12,4.5 8.5,7.5 9.5,12 6,9.5 2.5,12 3.5,7.5 0,4.5 4.5,4" fill="#FF8A65" opacity="0.8"/></svg>
    <svg class="star" width="8" height="8" viewBox="0 0 12 12"><polygon points="6,0 7.5,4 12,4.5 8.5,7.5 9.5,12 6,9.5 2.5,12 3.5,7.5 0,4.5 4.5,4" fill="#FFD700" opacity="0.7"/></svg>
    <svg class="star" width="10" height="10" viewBox="0 0 12 12"><polygon points="6,0 7.5,4 12,4.5 8.5,7.5 9.5,12 6,9.5 2.5,12 3.5,7.5 0,4.5 4.5,4" fill="#FF7043" opacity="0.8"/></svg>
    <svg class="star" width="6" height="6" viewBox="0 0 12 12"><polygon points="6,0 7.5,4 12,4.5 8.5,7.5 9.5,12 6,9.5 2.5,12 3.5,7.5 0,4.5 4.5,4" fill="#FFD700" opacity="0.6"/></svg>
    <svg class="star" width="9" height="9" viewBox="0 0 12 12"><polygon points="6,0 7.5,4 12,4.5 8.5,7.5 9.5,12 6,9.5 2.5,12 3.5,7.5 0,4.5 4.5,4" fill="#FFAB91" opacity="0.7"/></svg>

    <!-- 勋章 -->
    <div class="medal">
      <div class="medal-base">
        <div class="medal-inner">
          <!-- 小红花图标 -->
          <svg class="flower-icon" viewBox="0 0 100 100">
            <defs>
              <radialGradient id="petalGrad" cx="50%" cy="40%" r="60%">
                <stop offset="0%" stop-color="#FF6B6B"/>
                <stop offset="100%" stop-color="#ED3142"/>
              </radialGradient>
              <radialGradient id="centerGrad" cx="50%" cy="40%" r="50%">
                <stop offset="0%" stop-color="#FFE082"/>
                <stop offset="100%" stop-color="#FFB300"/>
              </radialGradient>
            </defs>
            <!-- 花瓣 -->
            <ellipse cx="50" cy="25" rx="16" ry="22" fill="url(#petalGrad)"/>
            <ellipse cx="50" cy="25" rx="16" ry="22" fill="url(#petalGrad)" transform="rotate(60, 50, 50)"/>
            <ellipse cx="50" cy="25" rx="16" ry="22" fill="url(#petalGrad)" transform="rotate(120, 50, 50)"/>
            <ellipse cx="50" cy="25" rx="16" ry="22" fill="url(#petalGrad)" transform="rotate(180, 50, 50)"/>
            <ellipse cx="50" cy="25" rx="16" ry="22" fill="url(#petalGrad)" transform="rotate(240, 50, 50)"/>
            <ellipse cx="50" cy="25" rx="16" ry="22" fill="url(#petalGrad)" transform="rotate(300, 50, 50)"/>
            <!-- 花心 -->
            <circle cx="50" cy="50" r="13" fill="url(#centerGrad)"/>
            <circle cx="47" cy="47" r="3" fill="rgba(255,255,255,0.5)"/>
          </svg>
        </div>
      </div>

      <!-- 绶带 -->
      <div class="ribbon">
        <svg viewBox="0 0 90 32">
          <path d="M0,8 C0,4 3,0 8,0 L82,0 C87,0 90,4 90,8 L90,20 L78,32 L72,20 L18,20 L12,32 L0,20 Z" fill="#ED3142"/>
          <path d="M0,8 C0,4 3,0 8,0 L82,0 C87,0 90,4 90,8 L90,10 C90,6 87,3 82,3 L8,3 C3,3 0,6 0,10 Z" fill="rgba(255,255,255,0.2)"/>
          <text x="45" y="14" text-anchor="middle" fill="white" font-size="9" font-weight="600" font-family="PingFang SC, sans-serif">腾讯公益</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- 内容区域 -->
  <div class="content">
    <div class="title">恭喜获得小红花！</div>
    <div class="subtitle">
      感谢你参与<strong>「献血点亮生命之光」</strong><br>
      你获得了一朵腾讯公益专属小红花
    </div>

    <!-- 微信状态预览 -->
    <div class="wechat-preview">
      <div class="preview-label">
        <span class="eye-icon">👀</span>
        <span>朋友将看到你的微信状态</span>
      </div>
      <div class="preview-card">
        <svg class="preview-flower" viewBox="0 0 100 100">
          <ellipse cx="50" cy="25" rx="14" ry="20" fill="#ED3142"/>
          <ellipse cx="50" cy="25" rx="14" ry="20" fill="#ED3142" transform="rotate(60, 50, 50)"/>
          <ellipse cx="50" cy="25" rx="14" ry="20" fill="#ED3142" transform="rotate(120, 50, 50)"/>
          <ellipse cx="50" cy="25" rx="14" ry="20" fill="#ED3142" transform="rotate(180, 50, 50)"/>
          <ellipse cx="50" cy="25" rx="14" ry="20" fill="#ED3142" transform="rotate(240, 50, 50)"/>
          <ellipse cx="50" cy="25" rx="14" ry="20" fill="#ED3142" transform="rotate(300, 50, 50)"/>
          <circle cx="50" cy="50" r="12" fill="#FFB300"/>
        </svg>
        <div class="preview-info">
          <div class="preview-status">献血点亮生命之光 ❤️</div>
          <div class="preview-source">来自腾讯公益</div>
        </div>
      </div>
    </div>

    <!-- 按钮 -->
    <div class="btn-wrap">
      <button class="btn-main">
        <span class="btn-text-main">戴上小红花</span>
        <span class="btn-text-sub">设为我的微信状态</span>
      </button>
    </div>

    <!-- 社会证明 -->
    <div class="social-proof">
      已有 <strong>23.8万</strong> 人戴上了小红花
    </div>
  </div>

  <!-- 关闭按钮 -->
  <button class="close-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" stroke-linecap="round">
      <line x1="6" y1="6" x2="18" y2="18"/>
      <line x1="18" y1="6" x2="6" y2="18"/>
    </svg>
  </button>
</div>

<script>
  // 生成光芒射线
  const raysContainer = document.getElementById('rays');
  const rayCount = 24;
  for (let i = 0; i < rayCount; i++) {
    const ray = document.createElement('div');
    ray.className = 'ray';
    const angle = (360 / rayCount) * i;
    const length = 60 + Math.random() * 70;
    const opacity = 0.15 + Math.random() * 0.25;
    const colors = ['#FFD700', '#FFA000', '#FFAB91', '#FF8A65', '#FFE082'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    ray.style.cssText = `
      height: ${length}px;
      transform: rotate(${angle}deg);
      background: linear-gradient(to top, ${color}, transparent);
      opacity: ${opacity};
    `;
    raysContainer.appendChild(ray);
  }

  // 生成飘散粒子
  const particlesContainer = document.getElementById('particles');
  for (let i = 0; i < 12; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    const size = 3 + Math.random() * 5;
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const delay = Math.random() * 3;
    const colors = ['#FFD700', '#FFA000', '#FF8A65', '#FFAB91', '#ED3142'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    particle.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${x}%;
      top: ${y}%;
      background: ${color};
      animation-delay: ${delay}s;
      animation-duration: ${2 + Math.random() * 2}s;
    `;
    particlesContainer.appendChild(particle);
  }

  // 生成飘落的小红花
  const fallingContainer = document.getElementById('fallingFlowers');
  for (let i = 0; i < 5; i++) {
    const flower = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    flower.setAttribute('class', 'falling-flower');
    flower.setAttribute('width', '14');
    flower.setAttribute('height', '14');
    flower.setAttribute('viewBox', '0 0 100 100');
    flower.innerHTML = `
      <ellipse cx="50" cy="30" rx="12" ry="18" fill="#ED3142" opacity="0.6"/>
      <ellipse cx="50" cy="30" rx="12" ry="18" fill="#ED3142" opacity="0.6" transform="rotate(72, 50, 50)"/>
      <ellipse cx="50" cy="30" rx="12" ry="18" fill="#ED3142" opacity="0.6" transform="rotate(144, 50, 50)"/>
      <ellipse cx="50" cy="30" rx="12" ry="18" fill="#ED3142" opacity="0.6" transform="rotate(216, 50, 50)"/>
      <ellipse cx="50" cy="30" rx="12" ry="18" fill="#ED3142" opacity="0.6" transform="rotate(288, 50, 50)"/>
      <circle cx="50" cy="50" r="10" fill="#FFB300" opacity="0.6"/>
    `;
    const left = 10 + Math.random() * 80;
    const delay = Math.random() * 4;
    const duration = 3 + Math.random() * 2;
    flower.style.cssText = `left: ${left}%; animation-delay: ${delay}s; animation-duration: ${duration}s;`;
    fallingContainer.appendChild(flower);
  }
</script>

</body>
</html>
